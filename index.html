<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clickable Images</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .row {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }
        .image-container {
            width: 260px;
            height: 260px;
            border: 2px solid #333;
            margin: 0px 60px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .image-container:hover {
            transform: scale(1.1);
            cursor: pointer;
        }
        .description {
            text-align: center;
            font-size: 30px;
            color: #333;
            width: 260px;
            margin: 10px auto;
        }
        .image-text-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 10px 100px;
        }
        .image-text-container.reversed {
            flex-direction: column-reverse;
        }
        h1 {
            text-align: center;
            font-size: 40px;
            color: #333;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Balance Exergames</h1>
    <div class="container">
        <div class="row">
            <div class="image-text-container">
                <div class="image-container">
                    <a href="#" onclick="redirectTo('FruitCuttingMaster')">
                        <img src="images/1.png" alt="Image 1">
                    </a>
                </div>
                <p class="description">FruitCuttingMaster</p>
            </div>
            <div class="image-text-container">
                <div class="image-container">
                    <a href="#" onclick="redirectTo('BubblePopKungFu')">
                        <img src="images/2.png" alt="Image 2">
                    </a>
                </div>
                <p class="description">BubblePopKungFu</p>
            </div>
            <div class="image-text-container">
                <div class="image-container">
                    <a href="#" onclick="redirectTo('MarineAdventure')">
                        <img src="images/3.png" alt="Image 3">
                    </a>
                </div>
                <p class="description">MarineAdventure</p>
            </div>
        </div>
        <div class="row">
            <div class="image-text-container reversed">
                <p class="description">StarCatcher</p>
                <div class="image-container">
                    <a href="#" onclick="redirectTo('StarCatcher')">
                        <img src="images/4.png" alt="Image 4">
                    </a>
                </div>
            </div>
            <div class="image-text-container reversed">
                <p class="description">SteppingMaster</p>
                <div class="image-container">
                    <a href="#" onclick="redirectTo('SteppingMaster')">
                        <img src="images/5.png" alt="Image 5">
                    </a>
                </div>
            </div>
        </div>
    </div>
    <script>
        function redirectTo(description) {
            window.location.href = `https://uoabiolab.github.io/${description}/`;
        }
    </script>
</body>
</html>
